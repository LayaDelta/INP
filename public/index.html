<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INP Inventory Manager | PC Components</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>

<body>

  <div class="blob shape-1"></div>
  <div class="blob shape-2"></div>

  <div class="app-container">
    <header class="app-header glass-panel">
      <div class="header-content">
        <h1><i class="fa-solid fa-microchip gradient-text"></i> <span data-i18n="appTitle">INP Inventory</span></h1>
        <p data-i18n="appSubtitle">Manage your PC Components effortlessly</p>
      </div>
      <div class="lang-switcher">
        <button id="lang-en" class="lang-btn active">EN</button>
        <button id="lang-es" class="lang-btn">ES</button>
      </div>
    </header>

    <main class="app-main">
      <section class="form-section glass-panel">
        <h2 id="form-title" data-i18n="formTitleAdd">Add New Component</h2>

        <form id="component-form">
          <input type="hidden" id="component-id">

          <div class="form-group">
            <label for="name" data-i18n="labelName">Component Name <span class="required">*</span></label>
            <input type="text" id="name" placeholder="e.g. NVIDIA RTX 4090" data-i18n-placeholder="placeholderName" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="category" data-i18n="labelCategory">Category <span class="required">*</span></label>
              <select id="category" required>
                <option value="" disabled selected data-i18n="optSelect">Select category...</option>
                <option value="CPU">CPU</option>
                <option value="GPU">GPU</option>
                <option value="RAM">RAM</option>
                <option value="Motherboard" data-i18n="optMotherboard">Motherboard</option>
                <option value="Storage" data-i18n="optStorage">Storage</option>
                <option value="PSU" data-i18n="optPSU">Power Supply</option>
                <option value="Case" data-i18n="optCase">Case</option>
                <option value="Cooler" data-i18n="optCooler">Cooling</option>
                <option value="Other" data-i18n="optOther">Other</option>
              </select>
            </div>

            <div class="form-group">
              <label for="price" data-i18n="labelPrice">Price ($) <span class="required">*</span></label>
              <input type="number" id="price" step="0.01" min="0" placeholder="0.00" required>
            </div>

            <div class="form-group">
              <label for="quantity" data-i18n="labelQuantity">Quantity</label>
              <input type="number" id="quantity" min="0" placeholder="0" value="0">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="description_en">Description (EN)</label>
              <textarea id="description_en" rows="2" placeholder="English description..." data-i18n-placeholder="placeholderDescEn"></textarea>
            </div>
            <div class="form-group">
              <label for="description_es">Descripción (ES)</label>
              <textarea id="description_es" rows="2" placeholder="Descripción en español..." data-i18n-placeholder="placeholderDescEs"></textarea>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" id="cancel-btn" class="btn btn-secondary hidden"><span data-i18n="btnCancel">Cancel Edit</span></button>
            <button type="submit" id="submit-btn" class="btn btn-primary"><i class="fa-solid fa-plus"></i> <span data-i18n="btnAdd">Add Component</span></button>
          </div>

          <div id="error-message" class="error-msg hidden"></div>
          <div id="success-message" class="success-msg hidden"></div>
        </form>
      </section>

      <section class="inventory-section">
        <div class="inventory-header">
          <h2><i class="fa-solid fa-box-open"></i> <span data-i18n="inventoryTitle">Current Inventory</span></h2>
          <div class="search-bar">
            <i class="fa-solid fa-search"></i>
            <input type="text" id="search-input" placeholder="Search components..." data-i18n-placeholder="placeholderSearch">
          </div>
        </div>

        <div id="loading" class="loading-state">
          <i class="fa-solid fa-circle-notch fa-spin"></i> <span data-i18n="loading">Loading inventory...</span>
        </div>

        <div id="components-grid" class="components-grid hidden">
          <!-- Components will be rendered here dynamically -->
        </div>

        <div id="pagination-controls" class="pagination-controls hidden">
          <button id="prev-page-btn" class="btn btn-secondary" disabled><i class="fa-solid fa-chevron-left"></i>
            <span data-i18n="btnPrev">Previous</span></button>
          <span id="page-indicator" class="page-indicator">Page 1 of 1</span>
          <button id="next-page-btn" class="btn btn-secondary"><span data-i18n="btnNext">Next</span> <i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div id="empty-state" class="empty-state hidden glass-panel">
          <i class="fa-regular fa-folder-open"></i>
          <h3 data-i18n="emptyTitle">No components found</h3>
          <p data-i18n="emptyDesc">Start by adding your first PC component using the form above.</p>
        </div>
      </section>
    </main>
  </div>

  <!-- Dedicated Edit Modal -->
  <div id="edit-modal" class="modal-overlay hidden">
    <div class="modal-content glass-panel animate-pop-in">
      <div class="modal-header">
        <h2 id="edit-form-title" data-i18n="formTitleEdit">Edit Component</h2>
        <button id="close-modal-btn" class="close-btn">&times;</button>
      </div>
      <form id="edit-component-form">
        <input type="hidden" id="edit-component-id">
        
        <div class="form-group">
          <label for="edit-name" data-i18n="labelName">Component Name <span class="required">*</span></label>
          <input type="text" id="edit-name" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="edit-category" data-i18n="labelCategory">Category <span class="required">*</span></label>
            <select id="edit-category" required>
              <option value="CPU">CPU</option>
              <option value="GPU">GPU</option>
              <option value="RAM">RAM</option>
              <option value="Motherboard" data-i18n="optMotherboard">Motherboard</option>
              <option value="Storage" data-i18n="optStorage">Storage</option>
              <option value="PSU" data-i18n="optPSU">Power Supply</option>
              <option value="Case" data-i18n="optCase">Case</option>
              <option value="Cooler" data-i18n="optCooler">Cooling</option>
              <option value="Other" data-i18n="optOther">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="edit-price" data-i18n="labelPrice">Price ($) <span class="required">*</span></label>
            <input type="number" id="edit-price" step="0.01" min="0" required>
          </div>
          <div class="form-group">
            <label for="edit-quantity" data-i18n="labelQuantity">Quantity</label>
            <input type="number" id="edit-quantity" min="0">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="edit-description-en">Description (EN)</label>
            <textarea id="edit-description-en" rows="3"></textarea>
          </div>
          <div class="form-group">
            <label for="edit-description-es">Descripción (ES)</label>
            <textarea id="edit-description-es" rows="3"></textarea>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" id="edit-cancel-btn" class="btn btn-secondary"><span data-i18n="btnCancel">Cancel</span></button>
          <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> <span data-i18n="btnUpdate">Update Component</span></button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/main.js"></script>
</body>

</html>
