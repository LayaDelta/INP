<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Register | INP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    .auth-container {
      max-width: 400px;
      margin: 100px auto;
      padding: 2rem;
      border-radius: var(--radius-lg);
      text-align: center;
    }
    .auth-tabs {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .auth-tab {
      padding: 0.5rem 1rem;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      opacity: 0.7;
      transition: all 0.3s;
      font-weight: 600;
    }
    .auth-tab.active {
      opacity: 1;
      border-bottom-color: var(--primary);
      color: var(--primary);
    }
    .auth-form {
      display: none;
    }
    .auth-form.active {
      display: block;
    }
    .auth-container .form-group {
      text-align: left;
    }
  </style>
</head>

<body>

  <div class="blob shape-1"></div>
  <div class="blob shape-2"></div>

  <div class="app-container">
    <header class="app-header glass-panel">
      <div class="header-content">
        <h1><i class="fa-solid fa-microchip gradient-text"></i> <span data-i18n="appTitle">INP Inventory</span></h1>
      </div>
      <div style="display: flex; gap: 15px; align-items: center;">
        <a href="index.html" style="color: white; text-decoration: none;"><i class="fa-solid fa-arrow-left"></i> Back to Store</a>
        <div class="lang-switcher">
          <button id="lang-en" class="lang-btn active">EN</button>
          <button id="lang-es" class="lang-btn">ES</button>
        </div>
      </div>
    </header>

    <main>
      <div class="auth-container glass-panel">
        <div class="auth-tabs">
          <div class="auth-tab active" id="tab-login">Login</div>
          <div class="auth-tab" id="tab-register">Register</div>
        </div>

        <div id="msg-box" class="hidden" style="margin-bottom: 1rem; padding: 0.5rem; border-radius: 4px;"></div>

        <!-- Login Form -->
        <form id="login-form" class="auth-form active">
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="login-email" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="login-password" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="auth-form">
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="reg-username" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="reg-email" required>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="reg-password" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
        </form>

      </div>
    </main>
  </div>

  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
</body>

</html>
